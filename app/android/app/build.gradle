plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.ccm_mobile"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.example.ccm_mobile"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            def storeFilePath = System.getenv("CCM_ANDROID_STORE_FILE")
            def storePasswordValue = System.getenv("CCM_ANDROID_STORE_PASSWORD")
            def keyAliasValue = System.getenv("CCM_ANDROID_KEY_ALIAS")
            def keyPasswordValue = System.getenv("CCM_ANDROID_KEY_PASSWORD")
            if (storeFilePath && storePasswordValue && keyAliasValue && keyPasswordValue) {
                storeFile = file(storeFilePath)
                storePassword = storePasswordValue
                keyAlias = keyAliasValue
                keyPassword = keyPasswordValue
            }
        }
    }

    buildTypes {
        release {
            def hasReleaseSigning = System.getenv("CCM_ANDROID_STORE_FILE") &&
                System.getenv("CCM_ANDROID_STORE_PASSWORD") &&
                System.getenv("CCM_ANDROID_KEY_ALIAS") &&
                System.getenv("CCM_ANDROID_KEY_PASSWORD")
            if (hasReleaseSigning) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

flutter {
    source = "../.."
}
